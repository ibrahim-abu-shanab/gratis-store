<!DOCTYPE html>
<html lang="tr" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glam Store — Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #c8637a;
      --accent-dark: #a04c62;
      --dark: #1e1e2e;
      --mid: #6b6b6b;
      --border: #e8e8e8;
      --bg: #f9f6f8;
      --white: #fff;
      --green: #27ae60;
      --red: #e74c3c;
      --font: 'Montserrat', sans-serif;
      --display: 'Playfair Display', serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--dark);
      color: #fff;
      padding: 0 40px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0, 0, 0, .3);
    }

    .topbar-logo {
      font-family: var(--display);
      font-size: 1.1rem;
      letter-spacing: 3px;
      color: var(--accent);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: .78rem;
      color: rgba(255, 255, 255, .6);
    }

    .topbar-right a {
      color: rgba(255, 255, 255, .5);
      text-decoration: none;
      font-size: .75rem;
      transition: color .2s;
    }

    .topbar-right a:hover {
      color: #fff;
    }

    .save-all-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 20px;
      font-family: var(--font);
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background .2s;
    }

    .save-all-btn:hover {
      background: var(--accent-dark);
    }

    .save-all-btn:disabled {
      background: #888;
      cursor: not-allowed;
    }

    /* ── Filters ── */
    .filters {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 14px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--mid);
      text-transform: uppercase;
    }

    .filter-btn {
      border: 1px solid var(--border);
      background: var(--white);
      padding: 6px 14px;
      font-family: var(--font);
      font-size: .73rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      color: var(--mid);
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .search-box {
      margin-left: auto;
      border: 1px solid var(--border);
      background: var(--bg);
      padding: 6px 14px;
      font-family: var(--font);
      font-size: .78rem;
      width: 220px;
      outline: none;
      transition: border-color .2s;
    }

    .search-box:focus {
      border-color: var(--accent);
    }

    /* ── Stats bar ── */
    .stats {
      padding: 10px 40px;
      font-size: .72rem;
      color: var(--mid);
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .stats strong {
      color: var(--dark);
    }

    #pending-count {
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: .68rem;
      font-weight: 700;
      display: none;
    }

    #pending-count.visible {
      display: inline;
    }





    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      padding: 20px 40px 60px;
    }

    /* ── Product card ── */
    .pcard {
      background: var(--white);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: box-shadow .25s, border-color .25s;
      position: relative;
    }

    .pcard.modified {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(200, 99, 122, .18);
    }

    .pcard.saved-flash {
      animation: flash-green .6s ease;
    }

    @keyframes flash-green {
      0% {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(39, 174, 96, .2);
      }

      100% {
        border-color: var(--border);
        box-shadow: none;
      }
    }

    .pcard-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: var(--bg);
    }

    .pcard-img-placeholder {
      width: 100%;
      height: 220px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #ddd;
    }

    .pcard-id {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0, 0, 0, .55);
      color: #fff;
      font-size: .65rem;
      font-weight: 700;
      padding: 3px 7px;
      letter-spacing: .5px;
    }

    .pcard-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field-label {
      font-size: .64rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--mid);
    }

    .field-input {
      border: 1px solid var(--border);
      background: var(--bg);
      padding: 8px 10px;
      font-family: var(--font);
      font-size: .82rem;
      color: var(--dark);
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }

    .field-input:focus {
      border-color: var(--accent);
      background: #fff;
    }

    .field-input.changed {
      border-color: var(--accent);
      background: #fff8fb;
    }

    .price-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .pcard-actions {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .btn-save {
      flex: 1;
      background: var(--dark);
      color: #fff;
      border: none;
      padding: 10px;
      font-family: var(--font);
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .8px;
      cursor: pointer;
      transition: background .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-save:hover {
      background: var(--green);
    }

    .btn-save.saving {
      background: var(--mid);
      cursor: wait;
    }

    .btn-save.done {
      background: var(--green);
    }

    .btn-reset {
      width: 40px;
      background: var(--white);
      border: none;
      border-left: 1px solid var(--border);
      color: var(--mid);
      cursor: pointer;
      font-size: .9rem;
      transition: color .2s, background .2s;
    }

    .btn-reset:hover {
      color: var(--red);
      background: #fff5f5;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--dark);
      color: #fff;
      padding: 12px 20px;
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .3px;
      border-left: 3px solid var(--accent);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      z-index: 9999;
      pointer-events: none;
      max-width: 320px;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Empty ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--mid);
      font-size: .9rem;
    }

    /* ── Loading ── */
    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px;
      color: var(--mid);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 640px) {
      .grid {
        padding: 16px;
        gap: 14px;
      }

      .topbar {
        padding: 0 16px;
      }

      .filters {
        padding: 10px 16px;
      }

      .stats {
        padding: 8px 16px;
      }
    }

    .topbar-right {
      margin-left: auto;

      display: flex;
      align-items: center;
      gap: 12px;
    }

    .add-product-btn {
      background: #c8637a;
      color: white;

      border: none;

      height: 42px;
      padding: 0 18px;

      border-radius: 12px;

      font-weight: 600;
      font-size: 14px;

      display: flex;
      align-items: center;
      gap: 8px;

      cursor: pointer;

      transition: .25s;
    }

    .add-product-btn:hover {
      background: #b45268;
    }

    #pending-count {
      background: #fff3f7;
      color: #c8637a;

      padding: 8px 14px;

      border-radius: 999px;

      font-size: 13px;
      font-weight: 700;
    }

    .save-all-btn {
      height: 42px;
      padding: 0 18px;

      border: none;

      border-radius: 12px;

      background: #222;
      color: #fff;

      font-weight: 600;
    }

    .back-site-btn {
      color: #888;
      font-weight: 600;
      transition: .25s;
    }

    .back-site-btn:hover {
      color: #c8637a;
    }

    .modal {
      position: fixed;
      inset: 0;

      background: rgba(0, 0, 0, .45);

      display: none;

      align-items: center;
      justify-content: center;

      z-index: 99999;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      width: 420px;

      background: #fff;

      border-radius: 20px;

      padding: 25px;

      display: flex;
      flex-direction: column;

      gap: 14px;
    }

    .modal-box h2 {
      font-family: var(--display);
      margin-bottom: 10px;
    }

    .modal-box input,
    .modal-box select {
      border: 1px solid #ddd;

      padding: 12px;

      border-radius: 10px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-actions button {
      flex: 1;

      border: none;

      padding: 12px;

      border-radius: 10px;

      cursor: pointer;
    }

    .modal-actions button:last-child {
      background: #c8637a;
      color: #fff;
    }
  </style>
</head>

<body>

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-logo">GLAM · ADMIN</div>
    <div class="topbar-right">
      <button class="add-product-btn" onclick="openProductModal()">
        <i class="fa-solid fa-plus"></i>
        Yeni Ürün
      </button>

      <span id="pending-count" class="visible">
        0 değişiklik
      </span>

      <button class="save-all-btn" id="saveAllBtn" onclick="saveAll()">
        <i class="fa-solid fa-floppy-disk"></i> Tümünü Kaydet
      </button>
      <a href="index.html">← Siteye Dön</a> <button onclick="logout()">Çıkış</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <span class="filter-label">Kategori:</span>
    <button class="filter-btn active" onclick="filterCat('')">Tümü</button>
    <button class="filter-btn" onclick="filterCat('makyaj')">Makyaj</button>
    <button class="filter-btn" onclick="filterCat('parfum')">Parfüm</button>
    <button class="filter-btn" onclick="filterCat('sac')">Saç</button>
    <button class="filter-btn" onclick="filterCat('vucut')">Vücut</button>
    <button class="filter-btn" onclick="filterCat('taki')">Takı</button>
    <input class="search-box" type="text" placeholder="🔍  Ürün ara..." id="searchBox" oninput="applyFilters()">
  </div>

  <!-- Stats -->
  <div class="stats">
    <span>Toplam: <strong id="totalCount">—</strong> ürün</span>
    <span>Gösterilen: <strong id="shownCount">—</strong></span>
    <span id="pending-label" style="display:none;">
      Kaydedilmemiş: <span id="pending-count2" style="color:var(--accent);font-weight:700;">0</span>
    </span>
  </div>



  <!-- Grid -->
  <div class="grid" id="grid">
    <div class="loading">
      <div class="spinner"></div>
      Ürünler yükleniyor...
    </div>
  </div>
  <div class="modal" id="productModal">

    <div class="modal-box">

      <h2>Yeni Ürün</h2>

      <input id="newName" placeholder="Ürün Adı">

      <input id="newPrice" type="number" placeholder="Fiyat">

      <input id="newStock" type="number" placeholder="Stok">

      <select id="newCategory">
        <option value="makyaj">Makyaj</option>
        <option value="parfum">Parfüm</option>
        <option value="sac">Saç</option>
        <option value="vucut">Vücut</option>
        <option value="taki">Takı</option>
      </select>

      <input id="newImage" type="file" accept="image/*">

      <div class="modal-actions">
        <button onclick="closeProductModal()">
          İptal
        </button>

        <button onclick="addProduct()">
          Ürünü Ekle
        </button>
      </div>

    </div>

  </div>
  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>

    // التحقق من وجود الـ admin key بالـ sessionStorage
    if (!sessionStorage.getItem("adminKey")) {
      window.location.href = "login.html";
    }

    function logout() {
      sessionStorage.removeItem("adminKey");
      window.location.href = "login.html";
    }

    // نقرأ الـ key من الـ session (جاء من السيرفر بعد اللوجين)
    const ADMIN_KEY = sessionStorage.getItem("adminKey") || "";
    let allProducts = [];
    let changes = {};   // { id: {name, price, stock} }
    let currentCat = "";
    function openProductModal() {
      document.getElementById("productModal")
        .classList.add("show");
    }

    function closeProductModal() {
      document.getElementById("productModal")
        .classList.remove("show");
    }
    async function addProduct() {

      const name = document.getElementById("newName").value.trim();
      const price = document.getElementById("newPrice").value;
      const stock = document.getElementById("newStock").value;
      const category = document.getElementById("newCategory").value;
      const imageFile = document.getElementById("newImage").files[0];

      if (!name || !price) {
        toast("Ürün adı ve fiyat gerekli");
        return;
      }

      try {

        const formData = new FormData();

        formData.append("name", name);
        formData.append("price", price);
        formData.append("stock", stock);
        formData.append("category", category);

        if (imageFile) {
          formData.append("image", imageFile);
        }

        const res = await fetch("/api/products", {
          method: "POST",
          headers: {
            admin: sessionStorage.getItem("adminKey") || ""
          },
          body: formData
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Hata");
        }

        closeProductModal();

        document.getElementById("newName").value = "";
        document.getElementById("newPrice").value = "";
        document.getElementById("newStock").value = "";
        document.getElementById("newImage").value = "";

        toast("✅ Ürün eklendi");

        loadProducts();

      } catch (err) {

        toast("⚠️ " + err.message);

      }
    }



    // ── Load products ──
    async function loadProducts() {
      try {
        const res = await fetch("/api/products");
        allProducts = await res.json();
        updateStats();
        applyFilters();
      } catch (e) {
        document.getElementById("grid").innerHTML = `<div class="empty">⚠️ Ürünler yüklenemedi. Server çalışıyor mu?</div>`;
      }
    }

    // ── Render ──
    function renderProducts(products) {
      const grid = document.getElementById("grid");
      document.getElementById("shownCount").textContent = products.length;

      if (products.length === 0) {
        grid.innerHTML = `<div class="empty">Bu kategoride ürün bulunamadı.</div>`;
        return;
      }

      grid.innerHTML = "";
      products.forEach(p => {
        const ch = changes[p.id] || {};
        const name = ch.name !== undefined ? ch.name : p.name;
        const price = ch.price !== undefined ? ch.price : p.price;
        const stock = ch.stock !== undefined ? ch.stock : p.stock;
        const isModified = changes[p.id] !== undefined;

        const card = document.createElement("div");
        card.className = "pcard" + (isModified ? " modified" : "");
        card.id = `card-${p.id}`;

        const catLabel = p.subcategory
          ? `${p.category} / ${p.subcategory}`
          : p.category;

        card.innerHTML = `
      <div class="pcard-id">#${p.id} · ${catLabel}</div>
      ${p.image
            ? `<img class="pcard-img" src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'pcard-img-placeholder\\'>🖼️</div>'">`
            : `<div class="pcard-img-placeholder">🖼️</div>`
          }
      <div class="pcard-body">
        <div class="field-group">
          <label class="field-label">Ürün Adı</label>
          <input class="field-input ${isModified && ch.name !== undefined ? 'changed' : ''}"
                 type="text" value="${escHtml(name)}"
                 id="name-${p.id}"
                 oninput="markChanged(${p.id}, 'name', this.value, '${escHtml(p.name)}')"
                 placeholder="Ürün adı girin...">
        </div>
        <div class="price-row">
          <div class="field-group">
            <label class="field-label">Fiyat (₺)</label>
            <input class="field-input ${isModified && ch.price !== undefined ? 'changed' : ''}"
                   type="number" step="0.01" min="0" value="${price}"
                   id="price-${p.id}"
                   oninput="markChanged(${p.id}, 'price', this.value, ${p.price})"
                   placeholder="0.00">
          </div>
          <div class="field-group">
            <label class="field-label">Stok</label>
            <input class="field-input ${isModified && ch.stock !== undefined ? 'changed' : ''}"
                   type="number" min="0" value="${stock}"
                   id="stock-${p.id}"
                   oninput="markChanged(${p.id}, 'stock', this.value, ${p.stock})"
                   placeholder="0">
          </div>
        </div>
        <div class="pcard-actions">
          <button class="btn-save" id="btn-${p.id}" onclick="saveProduct(${p.id})">
            <i class="fa-regular fa-floppy-disk"></i> Kaydet
          </button>

          <button class="btn-delete"
        onclick="deleteProduct(${p.id})"
        title="Sil">
    <i class="fa-solid fa-trash"></i>
</button>

          <button class="btn-reset" onclick="resetProduct(${p.id})" title="Sıfırla">
            <i class="fa-solid fa-rotate-left"></i>
          </button>
        </div>
      </div>
    `;
        grid.appendChild(card);
      });
    }

    // ── Track changes ──
    function markChanged(id, field, newVal, origVal) {
      if (!changes[id]) changes[id] = {};

      const parsed = field === "name" ? newVal : parseFloat(newVal);
      if (parsed == origVal || newVal === "") {
        delete changes[id][field];
        if (Object.keys(changes[id]).length === 0) delete changes[id];
      } else {
        changes[id][field] = newVal;
      }

      const card = document.getElementById(`card-${id}`);
      const inp = document.getElementById(`${field}-${id}`);
      if (card) card.classList.toggle("modified", !!changes[id]);
      if (inp) inp.classList.toggle("changed", changes[id] && changes[id][field] !== undefined);

      updatePendingCount();
    }

    function updatePendingCount() {
      const n = Object.keys(changes).length;
      const el = document.getElementById("pending-count");
      const el2 = document.getElementById("pending-count2");
      const lbl = document.getElementById("pending-label");
      if (el) { el.textContent = `${n} değişiklik`; el.classList.toggle("visible", n > 0); }
      if (el2) el2.textContent = n;
      if (lbl) lbl.style.display = n > 0 ? "" : "none";
    }

    // ── Save single ──
    async function saveProduct(id) {
      const ch = changes[id];
      if (!ch || Object.keys(ch).length === 0) { toast("Değişiklik yok."); return; }

      const btn = document.getElementById(`btn-${id}`);
      if (btn) { btn.classList.add("saving"); btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Kaydediliyor...`; }

      const body = {};
      if (ch.name !== undefined) body.name = ch.name;
      if (ch.price !== undefined) body.price = parseFloat(ch.price);
      if (ch.stock !== undefined) body.stock = parseInt(ch.stock);

      try {
        const res = await fetch(`/api/products/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json", "admin": ADMIN_KEY },
          body: JSON.stringify(body)
        });
        const updated = await res.json();
        if (!res.ok) throw new Error(updated.error || "Hata");

        // Update local data
        const idx = allProducts.findIndex(p => p.id === id);
        if (idx >= 0) Object.assign(allProducts[idx], body);

        delete changes[id];
        updatePendingCount();

        const card = document.getElementById(`card-${id}`);
        if (card) {
          card.classList.remove("modified");
          card.classList.add("saved-flash");
          setTimeout(() => card.classList.remove("saved-flash"), 700);
        }
        // Clear changed style from inputs
        ["name", "price", "stock"].forEach(f => {
          const inp = document.getElementById(`${f}-${id}`);
          if (inp) inp.classList.remove("changed");
        });

        if (btn) { btn.classList.remove("saving"); btn.classList.add("done"); btn.innerHTML = `<i class="fa-solid fa-check"></i> Kaydedildi`; setTimeout(() => { btn.classList.remove("done"); btn.innerHTML = `<i class="fa-regular fa-floppy-disk"></i> Kaydet`; }, 1800); }
        toast(`✅ #${id} güncellendi`);
      } catch (e) {
        if (btn) { btn.classList.remove("saving"); btn.innerHTML = `<i class="fa-regular fa-floppy-disk"></i> Kaydet`; }
        toast(`⚠️ Hata: ${e.message}`);
      }
    }

    // ── Save all ──
    async function saveAll() {
      const ids = Object.keys(changes);
      if (ids.length === 0) { toast("Kaydedilecek değişiklik yok."); return; }

      const btn = document.getElementById("saveAllBtn");
      btn.disabled = true;
      btn.textContent = `Kaydediliyor (0/${ids.length})...`;

      let done = 0;
      for (const id of ids) {
        await saveProduct(parseInt(id));
        done++;
        btn.textContent = `Kaydediliyor (${done}/${ids.length})...`;
      }

      btn.disabled = false;
      btn.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> Tümünü Kaydet`;
      toast(`✅ ${done} ürün güncellendi!`);
    }

    // ── Reset single ──
    function resetProduct(id) {
      const p = allProducts.find(pr => pr.id === id);
      if (!p) return;
      delete changes[id];
      updatePendingCount();

      const nameInp = document.getElementById(`name-${id}`);
      const priceInp = document.getElementById(`price-${id}`);
      const stockInp = document.getElementById(`stock-${id}`);
      if (nameInp) { nameInp.value = p.name; nameInp.classList.remove("changed"); }
      if (priceInp) { priceInp.value = p.price; priceInp.classList.remove("changed"); }
      if (stockInp) { stockInp.value = p.stock; stockInp.classList.remove("changed"); }

      const card = document.getElementById(`card-${id}`);
      if (card) card.classList.remove("modified");
    }

    // ── Filter / search ──
    function filterCat(cat) {
      currentCat = cat;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      event.currentTarget.classList.add("active");
      applyFilters();
    }

    function applyFilters() {
      const q = document.getElementById("searchBox").value.toLowerCase().trim();
      let filtered = allProducts;
      if (currentCat) filtered = filtered.filter(p => p.category === currentCat);
      if (q) filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || String(p.id).includes(q));
      renderProducts(filtered);
    }

    function updateStats() {
      document.getElementById("totalCount").textContent = allProducts.length;
    }

    // ── Helpers ──
    function escHtml(str) {
      return String(str).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function toast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(t._t);
      t._t = setTimeout(() => t.classList.remove("show"), 2800);
    }
    async function deleteProduct(id){

    if(!confirm("Bu ürünü silmek istiyor musunuz?")){
        return;
    }

    try{

        const res = await fetch(`/api/products/${id}`,{
            method:"DELETE",
            headers:{
                admin: ADMIN_KEY
            }
        });

        const data = await res.json();

        if(!res.ok){
            throw new Error(data.error || "Hata");
        }

        toast("✅ Ürün silindi");

        await loadProducts();

    }catch(err){

        toast("⚠️ " + err.message);

    }
}

    // ── Init ──
    loadProducts();
  </script>
